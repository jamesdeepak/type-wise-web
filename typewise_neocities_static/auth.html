<!DOCTYPE html>
<html lang="en" class="theme-ocean">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeWise - Authenticate</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .auth-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .form-control {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background-color: var(--bg-app);
      color: var(--text-main);
      font-family: inherit;
      outline: none;
      font-size: 15px;
    }
    .form-control:focus {
      border-color: var(--primary);
    }
    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-weight: 600;
      margin-top: 16px;
      background-color: var(--bg-card);
      color: var(--text-main);
    }
    .oauth-btn:hover {
      background-color: var(--bg-app);
    }
  </style>
</head>
<body>

  <div class="card auth-card">
    <div class="sidebar-logo" style="justify-content: center; margin-bottom: 20px; padding-left: 0;">
      <div class="logo-icon">TW</div>
      <span class="logo-text" style="font-size: 26px;">TypeWise</span>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="setMode('login')">Log In</div>
      <div class="auth-tab" id="tab-signup" onclick="setMode('signup')">Sign Up</div>
    </div>

    <!-- AUTH FORM -->
    <form id="auth-form" onsubmit="handleAuthSubmit(event)">
      <div class="form-group" id="group-name" style="display: none;">
        <label for="input-name">Display Name</label>
        <input type="text" id="input-name" class="form-control" placeholder="Jane Doe">
      </div>

      <div class="form-group">
        <label for="input-email">Email Address</label>
        <input type="email" id="input-email" class="form-control" placeholder="jane@example.com" required>
      </div>

      <div class="form-group">
        <label for="input-password">Password</label>
        <input type="password" id="input-password" class="form-control" placeholder="••••••••" required>
      </div>

      <div class="form-group" id="group-goal" style="display: none;">
        <label for="select-goal">What is your typing goal?</label>
        <select id="select-goal" class="form-control">
          <option value="casual">Casual Learner (10 min / day)</option>
          <option value="improve speed">Speed Booster (20 min / day)</option>
          <option value="exam prep">Exam Preparation (30 min / day)</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;" id="btn-submit">
        Log In
      </button>
    </form>

    <div style="text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted);">
      <a href="#" onclick="handleForgotPassword(event)" id="link-forgot">Forgot Password?</a>
    </div>

    <div style="display: flex; align-items: center; margin: 24px 0 16px 0; color: var(--border);">
      <hr style="flex-grow: 1; border-color: var(--border);">
      <span style="padding: 0 12px; font-size: 12px; color: var(--text-muted); text-transform: uppercase;">or</span>
      <hr style="flex-grow: 1; border-color: var(--border);">
    </div>

    <button class="oauth-btn" onclick="handleGoogleOAuth()">
      <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <script src="js/api.js"></script>
  <script>
    let activeMode = 'login';

    function setMode(mode) {
      activeMode = mode;
      const tabLogin = document.getElementById('tab-login');
      const tabSignup = document.getElementById('tab-signup');
      const groupName = document.getElementById('group-name');
      const groupGoal = document.getElementById('group-goal');
      const btnSubmit = document.getElementById('btn-submit');
      const linkForgot = document.getElementById('link-forgot');

      if (mode === 'signup') {
        tabLogin.classList.remove('active');
        tabSignup.classList.add('active');
        groupName.style.display = 'flex';
        groupGoal.style.display = 'flex';
        btnSubmit.textContent = 'Sign Up Free';
        linkForgot.style.display = 'none';
        document.getElementById('input-name').setAttribute('required', 'true');
      } else {
        tabLogin.classList.add('active');
        tabSignup.classList.remove('active');
        groupName.style.display = 'none';
        groupGoal.style.display = 'none';
        btnSubmit.textContent = 'Log In';
        linkForgot.style.display = 'inline';
        document.getElementById('input-name').removeAttribute('required');
      }
    }

    // Read starting mode from URL query ?mode=
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const mode = params.get('mode');
      if (mode === 'signup') {
        setMode('signup');
      }
    });

    async function handleAuthSubmit(e) {
      e.preventDefault();
      const email = document.getElementById('input-email').value;
      const password = document.getElementById('input-password').value;
      const name = document.getElementById('input-name').value;
      const startingGoal = document.getElementById('select-goal').value;

      try {
        if (activeMode === 'signup') {
          await API.signup(name, email, password, startingGoal);
          API.showToast('Account Created!', 'Welcome to TypeWise. Redirecting...', 'success');
        } else {
          await API.login(email, password);
          API.showToast('Login Successful!', 'Welcome back. Redirecting...', 'success');
        }
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);
      } catch (err) {
        API.showToast('Authentication Error', err.message, 'error');
      }
    }

    function handleForgotPassword(e) {
      e.preventDefault();
      const email = document.getElementById('input-email').value;
      if (!email) {
        API.showToast('Input Required', 'Please enter your email address to reset your password.', 'error');
        return;
      }
      API.showToast('Reset Link Sent', `A recovery link has been dispatched to ${email}`, 'success');
    }

    function handleGoogleOAuth() {
      API.showToast('Google Sign-In', 'Redirecting to OAuth provider (Mock)...', 'success');
      setTimeout(async () => {
        // Register mock google user
        try {
          const mockEmail = 'google.user@example.com';
          const mockName = 'Google Student';
          const randomPass = Math.random().toString(36);
          
          let user;
          try {
            user = await API.login(mockEmail, 'google-oauth-password');
          } catch(e) {
            // signup first
            await API.signup(mockName, mockEmail, 'google-oauth-password', 'casual');
          }
          window.location.href = 'dashboard.html';
        } catch (err) {
          API.showToast('OAuth Error', err.message, 'error');
        }
      }, 1000);
    }
  </script>
</body>
</html>
