<!DOCTYPE html>
<html lang="en" class="theme-ocean">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeWise - Profile & Settings</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .form-control {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background-color: var(--bg-app);
      color: var(--text-main);
      font-family: inherit;
      outline: none;
      font-size: 15px;
    }
    .form-control:focus {
      border-color: var(--primary);
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- SIDEBAR NAV -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">TW</div>
        <span class="logo-text">TypeWise</span>
      </div>
      <ul class="nav-links">
        <li class="nav-item"><a href="dashboard.html"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a></li>
        <li class="nav-item"><a href="lessons.html"><i data-lucide="book-open"></i> <span>Lessons</span></a></li>
        <li class="nav-item"><a href="tests.html"><i data-lucide="timer"></i> <span>Tests</span></a></li>
        <li class="nav-item"><a href="games.html"><i data-lucide="gamepad-2"></i> <span>Games</span></a></li>
        <li class="nav-item"><a href="themes.html"><i data-lucide="palette"></i> <span>Themes</span></a></li>
        <li class="nav-item"><a href="progress.html"><i data-lucide="trending-up"></i> <span>Progress</span></a></li>
        <li class="nav-item active"><a href="profile.html"><i data-lucide="user"></i> <span>Profile</span></a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="user-profile-summary" onclick="location.href='profile.html'">
          <div class="user-avatar-placeholder" id="nav-avatar">U</div>
          <div class="user-name-role">
            <span class="username-label" id="nav-username">Loading...</span>
            <span class="xp-label" id="nav-xp">0 XP</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN BODY -->
    <main class="main-content">
      <header class="top-header">
        <div class="header-title">
          <h1>Account Settings</h1>
          <p>Configure your typing engine layout preferences, targets, and notifications.</p>
        </div>
      </header>

      <div class="card" style="max-width: 720px;">
        <div class="card-title">Edit User Profile</div>
        
        <form id="profile-settings-form" onsubmit="handleProfileSubmit(event)">
          <!-- Name & Email -->
          <div class="form-row">
            <div class="form-group">
              <label for="profile-name">Display Name</label>
              <input type="text" id="profile-name" class="form-control" placeholder="Display name" required>
            </div>
            <div class="form-group">
              <label for="profile-email">Email Address (ReadOnly)</label>
              <input type="email" id="profile-email" class="form-control" disabled style="opacity: 0.6; cursor: not-allowed;">
            </div>
          </div>

          <!-- Daily goal & keyboard layout -->
          <div class="form-row">
            <div class="form-group">
              <label for="profile-goal">Daily Goal Target (Minutes)</label>
              <input type="number" id="profile-goal" class="form-control" min="1" max="120" value="10" required>
            </div>
            <div class="form-group">
              <label for="profile-layout">Keyboard Layout Layout</label>
              <select id="profile-layout" class="form-control">
                <option value="QWERTY">QWERTY Standard</option>
                <option value="Dvorak">Dvorak Simplified</option>
              </select>
            </div>
          </div>

          <!-- Font Size & sounds -->
          <div class="form-row">
            <div class="form-group">
              <label for="profile-fontsize">Typing Text Size</label>
              <select id="profile-fontsize" class="form-control">
                <option value="small">Small (18px)</option>
                <option value="medium">Medium (22px)</option>
                <option value="large">Large (26px)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="profile-sound">Keystroke Sound Feedback</label>
              <select id="profile-sound" class="form-control">
                <option value="1">Sound Enabled (On)</option>
                <option value="0">Sound Silenced (Off)</option>
              </select>
            </div>
          </div>

          <!-- Visual Skin configuration -->
          <div class="form-group" style="margin-bottom: 24px;">
            <label for="profile-theme">Active Visual Skin</label>
            <select id="profile-theme" class="form-control" style="width: 100%; max-width: 330px;" onchange="applyTheme(this.value)">
              <option value="ocean">Ocean Blue</option>
              <option value="forest">Forest Green</option>
              <option value="sunset">Sunset Orange</option>
              <option value="midnight">Midnight Dark</option>
              <option value="minimal">Minimal White</option>
              <option value="contrast">High-Contrast</option>
            </select>
          </div>

          <div style="border-top: 1px solid var(--border); padding-top: 20px; display: flex; gap: 12px; justify-content: flex-end;">
            <button type="button" class="btn btn-outline" onclick="location.href='dashboard.html'">Cancel</button>
            <button type="submit" class="btn btn-accent">Save Settings <i data-lucide="save"></i></button>
          </div>
        </form>
      </div>

    </main>
  </div>

  <!-- Lucide Script -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/api.js"></script>
  <script src="js/themes.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadProfileData();
    });

    async function loadProfileData() {
      if (window.API) {
        try {
          const user = await API.getCurrentUser();
          
          // Populate Navbar
          document.getElementById('nav-username').textContent = user.name;
          document.getElementById('nav-xp').textContent = `${user.xp} XP`;
          document.getElementById('nav-avatar').textContent = user.name.charAt(0).toUpperCase();

          // Populate Form inputs
          document.getElementById('profile-name').value = user.name;
          document.getElementById('profile-email').value = user.email;
          document.getElementById('profile-goal').value = user.daily_goal_minutes;
          document.getElementById('profile-layout').value = user.layout_pref || 'QWERTY';
          document.getElementById('profile-fontsize').value = user.font_size_pref || 'medium';
          document.getElementById('profile-sound').value = user.sound_pref !== undefined ? user.sound_pref.toString() : '1';
          document.getElementById('profile-theme').value = user.theme_pref || 'ocean';

          // Refresh icons
          if (window.lucide) {
            window.lucide.createIcons();
          }

        } catch (e) {
          console.error(e);
        }
      }
    }

    async function handleProfileSubmit(e) {
      e.preventDefault();
      
      const name = document.getElementById('profile-name').value;
      const daily_goal_minutes = Number(document.getElementById('profile-goal').value);
      const layout_pref = document.getElementById('profile-layout').value;
      const font_size_pref = document.getElementById('profile-fontsize').value;
      const sound_pref = Number(document.getElementById('profile-sound').value);
      const theme_pref = document.getElementById('profile-theme').value;

      try {
        const updates = {
          name,
          daily_goal_minutes,
          layout_pref,
          font_size_pref,
          sound_pref,
          theme_pref
        };

        await API.updateUserProfile(updates);
        API.showToast('Profile Updated', 'Your settings have been saved successfully.', 'success');
        
        // Re-load to update Navbar display
        loadProfileData();
      } catch (err) {
        API.showToast('Error', err.message, 'error');
      }
    }
  </script>
</body>
</html>
